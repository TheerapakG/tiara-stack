{{- if .Values.zeroCache.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "tiara-stack.zeroCacheEnvoyConfigName" . }}
  labels:
    {{- include "tiara-stack.labels" . | nindent 4 }}
    app: zero-cache
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 127.0.0.1
          port_value: 9901
    static_resources:
      listeners:
        - name: health_listener
          address:
            socket_address:
              address: 0.0.0.0
              port_value: 9902
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: health_check
                    route_config:
                      name: health_route
                      virtual_hosts:
                        - name: health
                          domains: ["*"]
                          routes:
                            - match: { path: "/ready" }
                              direct_response:
                                status: 200
                                body:
                                  inline_string: "OK"
                    http_filters:
                      - name: envoy.filters.http.health_check
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.health_check.v3.HealthCheck
                          pass_through_mode: false
                          headers:
                            - name: ":path"
                              string_match:
                                exact: "/ready"
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
        - name: jwks_listener
          address:
            socket_address:
              address: 127.0.0.1
              port_value: 15010
          filter_chains:
            - filters:
                - name: envoy.filters.network.http_connection_manager
                  typed_config:
                    "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                    stat_prefix: jwks_proxy
                    route_config:
                      name: local_route
                      virtual_hosts:
                        - name: kubernetes
                          domains: ["*"]
                          routes:
                            - match: { prefix: "/" }
                              route:
                                cluster: kubernetes
                                retry_policy:
                                  retry_on: 5xx,gateway-error,connect-failure,reset
                                  num_retries: 2
                                  retry_back_off:
                                    base_interval: 0.1s
                                    max_interval: 1s
                    http_filters:
                      - name: envoy.filters.http.lua
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                          inline_code: |
                            -- Envoy runs this Lua VM per worker. Token caches are
                            -- therefore per-worker and observe token rotation after
                            -- token_refresh_interval_seconds.
                            local cached_token = nil
                            local last_refresh = 0
                            local configured_refresh_interval = tonumber(os.getenv("TOKEN_REFRESH_INTERVAL_SECONDS") or "")
                            local token_refresh_interval_seconds = 300
                            if configured_refresh_interval ~= nil and configured_refresh_interval > 0 then
                              token_refresh_interval_seconds = configured_refresh_interval
                            end

                            local token_path = "/var/run/secrets/kubernetes.io/serviceaccount/token"

                            local function service_account_token()
                              local now = os.time()
                              if cached_token ~= nil and now - last_refresh < token_refresh_interval_seconds then
                                return cached_token
                              end

                              local f, open_err = io.open(token_path, "r")
                              if not f then
                                return nil, "failed to open " .. token_path .. ": " .. tostring(open_err)
                              end

                              local contents, read_err = f:read("*a")
                              f:close()
                              if not contents then
                                return nil, "failed to read " .. token_path .. ": " .. tostring(read_err)
                              end

                              cached_token = contents:gsub("%s+$", "")
                              last_refresh = now

                              return cached_token, nil
                            end

                            function envoy_on_request(req)
                              local token, err = service_account_token()
                              if token ~= nil and token:match("%S") then
                                req:headers():replace("Authorization", "Bearer " .. token)
                              elseif err then
                                req:logWarn(err)
                                req:respond({[":status"] = "503"}, "failed to load service account token")
                                return
                              else
                                req:logWarn("service account token was empty")
                                req:respond({[":status"] = "503"}, "failed to load service account token")
                                return
                              end
                            end
                      - name: envoy.filters.http.router
                        typed_config:
                          "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
        - name: kubernetes
          type: STRICT_DNS
          connect_timeout: 1s
          lb_policy: ROUND_ROBIN
          dns_lookup_family: AUTO
          load_assignment:
            cluster_name: kubernetes
            endpoints:
              - lb_endpoints:
                  - endpoint:
                      address:
                        socket_address:
                          address: kubernetes.default.svc.cluster.local
                          port_value: 443
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
              common_tls_context:
                validation_context:
                  trusted_ca:
                    filename: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              sni: kubernetes.default.svc.cluster.local
{{- end }}
