apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Required external ConfigMap:
#   name: sheet-cluster-ca-certificate
#   key: ca-certificate.crt
# It supplies the project CA at runtime so certificate rotation does not require
# rebuilding the sheet-cluster image.
secretGenerator:
  - name: sheet-cluster-secret
    envs:
      - .env.secret
configMapGenerator:
generatorOptions:
  disableNameSuffixHash: true
resources:
