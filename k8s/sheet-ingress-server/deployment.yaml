apiVersion: apps/v1
kind: Deployment
metadata:
  name: sheet-ingress-server
  labels:
    app: sheet-ingress-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sheet-ingress-server
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: sheet-ingress-server
    spec:
      containers:
        - name: sheet-ingress-server
          image: <IMAGE>
          ports:
            - containerPort: 3000
              name: ingress-svc
          env:
            - name: SHEET_APIS_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: sheet-ingress-server-secret
                  key: sheetApisBaseUrl
            - name: SHEET_BOT_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: sheet-ingress-server-secret
                  key: sheetBotBaseUrl
            - name: SHEET_AUTH_ISSUER
              valueFrom:
                secretKeyRef:
                  name: sheet-ingress-server-secret
                  key: sheetAuthIssuer
          livenessProbe:
            httpGet:
              path: /health
              port: ingress-svc
              scheme: HTTP
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: ingress-svc
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: ingress-svc
              scheme: HTTP
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 12
      serviceAccountName: sheet-ingress-server
---
apiVersion: v1
kind: Service
metadata:
  name: sheet-ingress-server-service
  labels:
    app: sheet-ingress-server
spec:
  ports:
    - name: ingress-svc
      protocol: TCP
      port: 80
      targetPort: ingress-svc
  selector:
    app: sheet-ingress-server
